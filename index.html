<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Workshop — Filament</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;700&family=Inter:wght@400;500&family=Geist+Mono:wght@500&display=swap">
<style>
  :root{
    --bg:#1B1813; --surface:#24221D; --border:#474338;
    --fg:#FCF6DC; --muted:#A1A1A1; --dim:#A09771; --accent:#6DB0F8;
    --sans:'Schibsted Grotesk','Inter',-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--fg);
    font-family:'Inter',-apple-system,system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:24px; text-align:center; -webkit-font-smoothing:antialiased;
  }
  .card{max-width:640px}
  .kicker{
    font-family:'Geist Mono',monospace; text-transform:uppercase;
    letter-spacing:.18em; font-size:14px; color:var(--accent); margin:0 0 22px;
  }
  h1{
    font-family:var(--sans); font-weight:700;
    font-size:clamp(44px,8vw,84px); line-height:1.03; letter-spacing:-.02em; margin:0;
  }
  .tag{
    display:inline-block; margin:26px 0 0; padding:9px 20px;
    background:var(--surface); border:1px solid var(--border); border-radius:50px;
    font-family:'Geist Mono',monospace; font-size:14px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--dim);
  }
  p.sub{font-size:19px; line-height:1.5; color:var(--muted); margin:30px auto 0; max-width:520px}
  p.note{font-size:15px; line-height:1.5; color:var(--dim); margin:34px auto 0; max-width:480px}
</style>
</head>
<body>
  <div class="card">
    <p class="kicker">Filament workshop</p>
    <h1>Agent Workshop</h1>
    <span class="tag">New deck coming soon</span>
    <p class="sub">This one's getting an update. Check back in a bit and it'll be here, same link.</p>
    <p class="note">Built an agent with me at the workshop? Find me on Filament and we'll keep going.</p>
  </div>
</body>
</html>
